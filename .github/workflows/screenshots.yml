name: Screenshot

on:
  push:
    branches:
      - main

jobs:
  screenshot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Install http-server
        run: npm install -g http-server

      - name: Start server
        run: |
          http-server dist -p 3000 &
          sleep 5

      - name: Screenshot
        uses: swinton/screenshot-website@v1
        with:
          source: http://localhost:3000
          destination: screenshots/home.png
      
      - name: Commit Screenshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update screenshot"
